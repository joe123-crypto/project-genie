name: Reusable Quality Gate

on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run auth and API smoke tests
        run: npm run test:smoke

      - name: Print server log on failure
        if: failure()
        run: if [ -f .smoke-next.log ]; then cat .smoke-next.log; fi
